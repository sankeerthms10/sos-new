<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="chipsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935"/>
      <stop offset="50%" style="stop-color:#FF6D00"/>
      <stop offset="100%" style="stop-color:#FFD600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#chipsGrad)" filter="url(#glow)"/>
  <text x="50" y="62" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="white" filter="url(#glow)">SOS</text>
  <path d="M25 75 Q35 65, 45 75 Q55 85, 65 75" stroke="#FFD600" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="30" cy="25" rx="8" ry="5" fill="#FFD600" opacity="0.7" transform="rotate(-30 30 25)"/>
  <ellipse cx="70" cy="30" rx="6" ry="4" fill="#FF6D00" opacity="0.7" transform="rotate(30 70 30)"/>
</svg>
